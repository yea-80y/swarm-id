name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm exec prettier --check .

      - name: Build bee-js dependency
        working-directory: ./bee-js
        run: pnpm build

      - name: Build lib dependency
        working-directory: ./lib
        run: pnpm build

      - name: Build swarm-ui
        working-directory: ./swarm-ui
        run: pnpm build

      - name: Check the build (swarm-ui)
        working-directory: ./swarm-ui
        run: pnpm run check

      - name: Code linting (swarm-ui)
        working-directory: ./swarm-ui
        run: pnpm run lint

      - name: Check dependencies and unused files (swarm-ui)
        working-directory: ./swarm-ui
        run: pnpm knip

      - name: Run swarm-ui unit tests
        working-directory: ./swarm-ui
        run: pnpm test:unit

      - name: Build demo
        working-directory: ./demo
        run: pnpm build

      - name: Check the build (demo)
        working-directory: ./demo
        run: pnpm run check

      - name: Code linting (demo)
        working-directory: ./demo
        run: pnpm run lint

      - name: Check dependencies and unused files (demo)
        working-directory: ./demo
        run: pnpm knip
