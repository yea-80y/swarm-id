name: Deploy Docs PR Preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed
    paths:
      - 'docs-site/**'
      - '.github/workflows/deploy-docs-preview.yml'

concurrency: preview-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        if: github.event.action != 'closed'
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        if: github.event.action != 'closed'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        if: github.event.action != 'closed'
        run: pnpm install --frozen-lockfile

      - name: Build docs with PR base path
        if: github.event.action != 'closed'
        working-directory: docs-site
        run: pnpm astro build --base /pr-preview/pr-${{ github.event.number }}/

      - name: Deploy PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: docs-site/dist
          umbrella-dir: pr-preview
          custom-url: swarm-docs.snaha.net
